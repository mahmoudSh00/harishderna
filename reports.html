<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derna Elite - التقارير</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray">
    <div class="d-flex">
        <nav class="sidebar bg-dark">
            <div class="sidebar-header bg-gold text-dark p-3 text-center">
                <h4 class="fw-bold mb-0">Derna Elite</h4>
            </div>
            <ul class="nav flex-column p-2">
                <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>لوحة التحكم</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html"><i class="bi bi-box-seam me-2"></i>المنتجات</a></li>
                <li class="nav-item"><a class="nav-link" href="sales.html"><i class="bi bi-cart-check me-2"></i>المبيعات</a></li>
                <li class="nav-item"><a class="nav-link" href="purchases.html"><i class="bi bi-bag-check me-2"></i>المشتريات</a></li>
                <li class="nav-item"><a class="nav-link" href="inventory.html"><i class="bi bi-clipboard-data me-2"></i>المخزون</a></li>
                <li class="nav-item"><a class="nav-link" href="barcodes.html"><i class="bi bi-upc-scan me-2"></i>الباركود</a></li>
                <li class="nav-item"><a class="nav-link active" href="reports.html"><i class="bi bi-graph-up me-2"></i>التقارير</a></li>
                <li class="nav-item"><a class="nav-link" href="users.html"><i class="bi bi-people me-2"></i>المستخدمين</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-left me-2"></i>تسجيل الخروج</a></li>
            </ul>
        </nav>

        <main class="main-content flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-dark fw-bold">التقارير</h2>
                <div class="text-muted" id="welcomeUser"></div>
            </div>

            <div class="card bg-white shadow-sm mb-4">
                <div class="card-header bg-dark text-gold">
                    <h5 class="mb-0"><i class="bi bi-filter me-2"></i>تصفية التاريخ</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">من</label>
                            <input type="date" class="form-control" id="dateFrom">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">إلى</label>
                            <input type="date" class="form-control" id="dateTo">
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button class="btn btn-gold w-100" id="generateReportBtn">
                                <i class="bi bi-play-circle me-2"></i>توليد التقرير
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card stat-card bg-dark border-gold">
                        <div class="card-body">
                            <h6 class="text-gold">إجمالي المبيعات</h6>
                            <h3 class="text-white fw-bold" id="reportTotalSales">0 د.ل</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-dark border-gold">
                        <div class="card-body">
                            <h6 class="text-gold">إجمالي المشتريات</h6>
                            <h3 class="text-white fw-bold" id="reportTotalPurchases">0 د.ل</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-dark border-gold">
                        <div class="card-body">
                            <h6 class="text-gold">الربح</h6>
                            <h3 class="text-white fw-bold" id="reportProfit">0 د.ل</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-dark border-gold">
                        <div class="card-body">
                            <h6 class="text-gold">عدد الفواتير</h6>
                            <h3 class="text-white fw-bold" id="reportInvoiceCount">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card bg-white shadow-sm">
                <div class="card-header bg-dark text-gold d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-graph-up me-2"></i>المنتجات الأكثر مبيعاً</h5>
                    <div>
                        <button class="btn btn-sm btn-outline-gold me-2" id="exportPDFBtn">
                            <i class="bi bi-file-earmark-pdf me-1"></i>PDF
                        </button>
                        <button class="btn btn-sm btn-outline-gold" id="exportExcelBtn">
                            <i class="bi bi-file-earmark-excel me-1"></i>Excel
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="bg-gray">
                                <tr>
                                    <th>المنتج</th>
                                    <th>الكمية المباعة</th>
                                    <th>الإيرادات</th>
                                </tr>
                            </thead>
                            <tbody id="topProductsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
