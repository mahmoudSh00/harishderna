<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derna Elite - إدارة المستخدمين</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray">
    <!-- Toggle Button for All Screens -->
    <button class="btn btn-gold sidebar-toggle position-fixed top-0 end-0 m-3 z-3" type="button">
        <i class="bi bi-list fs-3"></i>
    </button>
    
    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay d-md-none"></div>
    
    <div class="d-flex">
        <nav class="sidebar bg-dark">
            <div class="sidebar-header bg-gold text-dark p-3 text-center">
                <h4 class="fw-bold mb-0">Derna Elite</h4>
            </div>
            <ul class="nav flex-column p-2">
                <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>لوحة التحكم</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html"><i class="bi bi-box-seam me-2"></i>المنتجات</a></li>
                <li class="nav-item"><a class="nav-link" href="sales.html"><i class="bi bi-cart-check me-2"></i>المبيعات</a></li>
                <li class="nav-item"><a class="nav-link" href="purchases.html"><i class="bi bi-bag-check me-2"></i>المشتريات</a></li>
                <li class="nav-item"><a class="nav-link" href="inventory.html"><i class="bi bi-clipboard-data me-2"></i>المخزون</a></li>
                <li class="nav-item"><a class="nav-link" href="barcodes.html"><i class="bi bi-upc-scan me-2"></i>الباركود</a></li>
                <li class="nav-item"><a class="nav-link" href="reports.html"><i class="bi bi-graph-up me-2"></i>التقارير</a></li>
                <li class="nav-item"><a class="nav-link active" href="users.html"><i class="bi bi-people me-2"></i>المستخدمين</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-left me-2"></i>تسجيل الخروج</a></li>
            </ul>
        </nav>

        <main class="main-content flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-dark fw-bold">إدارة المستخدمين</h2>
                <div class="d-flex gap-3 align-items-center">
                    <div class="text-muted" id="welcomeUser"></div>
                    <button class="btn btn-gold" data-bs-toggle="modal" data-bs-target="#userModal">
                        <i class="bi bi-plus-lg me-2"></i>إضافة مستخدم جديد
                    </button>
                </div>
            </div>

            <div class="card bg-white shadow-sm">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="bg-dark text-gold">
                                <tr>
                                    <th>اسم المستخدم</th>
                                    <th>الدور</th>
                                    <th>الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="usersTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- User Modal -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-gold">
                    <h5 class="modal-title text-gold" id="userModalTitle">إضافة مستخدم جديد</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <input type="hidden" id="userId">
                        <div class="mb-3">
                            <label class="form-label">اسم المستخدم</label>
                            <input type="text" class="form-control bg-gray text-dark" id="userName" required>
                        </div>
                        <div class="mb-3" id="passwordField">
                            <label class="form-label">كلمة المرور</label>
                            <input type="password" class="form-control bg-gray text-dark" id="userPassword">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الدور</label>
                            <select class="form-select bg-gray text-dark" id="userRole" required>
                                <option value="admin">مدير (Administrator)</option>
                                <option value="cashier">كاشير (Cashier)</option>
                                <option value="manager">مدير فرع (Manager)</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-gold">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="submit" form="userForm" class="btn btn-gold">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-gold">
                    <h5 class="modal-title text-gold">تغيير كلمة المرور</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="changePasswordForm">
                        <input type="hidden" id="changePasswordUserId">
                        <div class="mb-3">
                            <label class="form-label">كلمة المرور الجديدة</label>
                            <input type="password" class="form-control bg-gray text-dark" id="newPassword" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">تأكيد كلمة المرور</label>
                            <input type="password" class="form-control bg-gray text-dark" id="confirmPassword" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-gold">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="submit" form="changePasswordForm" class="btn btn-gold">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/users.js"></script>
</body>
</html>
