<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derna Elite - المخزون</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray">
    <!-- Toggle Button for All Screens -->
    <button class="btn btn-gold sidebar-toggle position-fixed top-0 end-0 m-3 z-3" type="button">
        <i class="bi bi-list fs-3"></i>
    </button>
    
    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay d-md-none"></div>
    
    <div class="d-flex">
        <nav class="sidebar bg-dark">
            <div class="sidebar-header bg-gold text-dark p-3 text-center">
                <h4 class="fw-bold mb-0">Derna Elite</h4>
            </div>
            <ul class="nav flex-column p-2">
                <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>لوحة التحكم</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html"><i class="bi bi-box-seam me-2"></i>المنتجات</a></li>
                <li class="nav-item"><a class="nav-link" href="sales.html"><i class="bi bi-cart-check me-2"></i>المبيعات</a></li>
                <li class="nav-item"><a class="nav-link" href="purchases.html"><i class="bi bi-bag-check me-2"></i>المشتريات</a></li>
                <li class="nav-item"><a class="nav-link active" href="inventory.html"><i class="bi bi-clipboard-data me-2"></i>المخزون</a></li>
                <li class="nav-item"><a class="nav-link" href="barcodes.html"><i class="bi bi-upc-scan me-2"></i>الباركود</a></li>
                <li class="nav-item"><a class="nav-link" href="reports.html"><i class="bi bi-graph-up me-2"></i>التقارير</a></li>
                <li class="nav-item"><a class="nav-link" href="users.html"><i class="bi bi-people me-2"></i>المستخدمين</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-left me-2"></i>تسجيل الخروج</a></li>
            </ul>
        </nav>

        <main class="main-content flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-dark fw-bold">إدارة المخزون</h2>
                <div class="text-muted" id="welcomeUser"></div>
            </div>

            <div class="card bg-white shadow-sm mb-4">
                <div class="card-header bg-dark text-gold">
                    <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>حركة المخزون</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="bg-gray">
                                <tr>
                                    <th>التاريخ</th>
                                    <th>النوع</th>
                                    <th>المنتج</th>
                                    <th>الكمية</th>
                                    <th>الملاحظات</th>
                                </tr>
                            </thead>
                            <tbody id="stockMovementsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card bg-white shadow-sm">
                <div class="card-header bg-dark text-gold">
                    <h5 class="mb-0"><i class="bi bi-box-seam me-2"></i>حالة المخزون</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="bg-gray">
                                <tr>
                                    <th>المنتج</th>
                                    <th>الكمية</th>
                                    <th>سعر الشراء</th>
                                    <th>القيمة</th>
                                    <th>الحالة</th>
                                </tr>
                            </thead>
                            <tbody id="stockStatusTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/inventory.js"></script>
</body>
</html>
