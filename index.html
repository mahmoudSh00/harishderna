<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derna Elite - POS & Inventory Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-white">
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100">
            <div class="col-12 col-md-6 col-lg-4 mx-auto">
                <div class="card bg-dark border-gold shadow-lg">
                    <div class="card-header bg-gold text-dark text-center py-4">
                        <h1 class="display-4 fw-bold">Derna Elite</h1>
                        <p class="mb-0">نظام إدارة المبيعات والمخزون</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label text-gold">اسم المستخدم</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-gold text-dark"><i class="bi bi-person-fill"></i></span>
                                    <input type="text" class="form-control bg-dark text-white" id="username" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label text-gold">كلمة المرور</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-gold text-dark"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" class="form-control bg-dark text-white" id="password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-gold w-100 py-3 fs-5 fw-bold">
                                <i class="bi bi-box-arrow-in-right me-2"></i>تسجيل الدخول
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
